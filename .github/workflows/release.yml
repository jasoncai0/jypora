name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    # macos-13 (Intel) creates DMGs via HFS+; APFS dmg creation on arm64
    # hosted runners is flaky (hdiutil detach races).
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      # node-gyp (for native node-pty) needs distutils, removed in Python 3.12+.
      - run: python -m pip install setuptools
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:coverage
      - name: Build macOS .dmg
        run: pnpm package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.dmg
          fail_on_unmatched_files: true
