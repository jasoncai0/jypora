appId: com.jypora.app
productName: jypora
directories:
  output: release
  buildResources: build
files:
  - out/**/*
  - package.json
mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  artifactName: ${productName}-${version}-${arch}.${ext}
dmg:
  title: ${productName} ${version}
